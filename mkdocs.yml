site_name: IEEE RAS TC on Human-Robot Interaction and Collaboration
site_description: >-
  Official site of the IEEE RAS Technical Committee on Human-Robot Interaction
  and Collaboration (TC HRI&C).
site_url: https://ieeeras-tc-hric.github.io/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - content.code.copy
    - toc.follow
  palette:
    scheme: default
    primary: indigo
    accent: blue

nav:
  - Home: index.md
  - Seminars: seminars.md
  - Members: members.md

plugins: []

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/IeeeS40766
      name: TC HRI&C on X
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ieee-ras-tc-hric-sr-ieee-ras-14a3b040a/
      name: TC HRI&C on LinkedIn
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@IEEERASTCHRICSR
      name: TC HRI&C on YouTube
  generator: false

copyright: >-
  Copyright &copy; 2026 IEEE RAS Technical Committee on Human-Robot Interaction
  and Collaboration
